name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run health checks
        run: npm run check

      - name: Build Windows installer
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $appVersion = "${{ github.ref_name }}".TrimStart("v")
            Write-Host "Tag build detected, override app version to: $appVersion"
            npx electron-builder --win nsis --x64 --publish never "-c.extraMetadata.version=$appVersion"
          } else {
            npm run dist:win
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: script-generator-win-installer
          path: release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
