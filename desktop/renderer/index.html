<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>风的工具箱 Workflow Studio</title>
    <link rel="icon" href="../assets/icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <span class="glow glow-a"></span>
      <span class="glow glow-b"></span>
      <span class="grid"></span>
    </div>

    <header class="topbar">
      <div class="brand">
        <p class="brand-eyebrow">WORKFLOW STUDIO</p>
        <h1>风的工具箱</h1>
        <p id="metaText">加载中...</p>
      </div>
      <div class="topbar-actions">
        <span id="saveState" class="status-pill neutral">等待加载</span>
        <button id="saveProjectBtn" type="button">保存到项目库</button>
        <button id="previewBtn" type="button">刷新预览</button>
        <button id="generateBtn" class="primary" type="button">生成项目</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <section class="panel-card starter-card">
          <div class="section-head">
            <h2>新建流程</h2>
          </div>
          <button id="createBlankBtn" type="button">空白流程</button>
          <button id="createImportBtn" class="primary" type="button">从抓包开始</button>
          <button id="importWorkflowBtn" type="button">导入流程文件</button>
          <label>
            模板起点
            <select id="templateSelect"></select>
          </label>
          <button id="createTemplateBtn" type="button">从模板开始</button>
          <p class="helper-copy">
            现在只有一个主工作台。先创建流程，再在中间区域按五段流程补齐配置。
          </p>
        </section>

        <section class="panel-card library-card">
          <div class="section-head">
            <h2>项目库</h2>
            <button id="refreshProjectsBtn" class="ghost-btn" type="button">刷新</button>
          </div>
          <div id="projectList" class="project-list"></div>
        </section>
      </aside>

      <section class="studio">
        <section class="panel-card">
          <div class="section-head">
            <h2><span class="section-index">1</span>项目基础信息</h2>
            <span id="projectMetaBadge" class="meta-pill">未加载</span>
          </div>
          <div class="field-grid">
            <label>
              项目名
              <input id="projectNameInput" type="text" />
            </label>
            <label>
              输出目录
              <div class="inline-row">
                <input id="outputDirInput" type="text" />
                <button id="chooseOutputDirBtn" type="button">选择</button>
              </div>
            </label>
            <label>
              并发账号数
              <input id="concurrencyInput" type="number" min="1" />
            </label>
            <label class="toggle-row">
              <span>使用代理文件</span>
              <input id="useProxyInput" type="checkbox" />
            </label>
            <label class="toggle-row">
              <span>循环执行</span>
              <input id="repeatInput" type="checkbox" />
            </label>
            <label>
              循环间隔（分钟）
              <input id="intervalInput" type="number" min="1" />
            </label>
          </div>
        </section>

        <section class="panel-card">
          <div class="section-head">
            <h2><span class="section-index">2</span>来源材料</h2>
          </div>
          <div id="sourcePanel" class="source-panel"></div>
        </section>

        <section class="panel-card">
          <div class="section-head">
            <h2><span class="section-index">3</span>账号与登录</h2>
          </div>
          <div class="field-grid">
            <label>
              账号来源
              <select id="accountSourceSelect"></select>
            </label>
            <label>
              账号字段（accounts 模式）
              <input id="accountFieldsInput" type="text" placeholder="email,password" />
            </label>
            <label>
              登录方式
              <select id="authModeSelect"></select>
            </label>
          </div>
          <div id="authEditor" class="auth-editor"></div>
        </section>

        <section class="panel-card">
          <div class="section-head">
            <h2><span class="section-index">4</span>步骤卡片流</h2>
            <div class="inline-actions">
              <select id="stepTypeSelect"></select>
              <button id="addStepBtn" type="button">新增步骤</button>
            </div>
          </div>
          <div class="helper-copy">
            步骤严格按顺序执行。你可以启用、禁用、排序、复制、删除，并修改每个步骤的基础字段。
          </div>
          <div id="stepList" class="step-list"></div>
        </section>
      </section>

      <aside class="inspector">
        <section class="panel-card">
          <div class="section-head">
            <h2><span class="section-index">5</span>诊断</h2>
            <span id="diagnosticSummary" class="status-pill neutral">0 阻塞</span>
          </div>
          <div id="diagnosticsList" class="diagnostics-list"></div>
        </section>

        <section class="panel-card">
          <div class="section-head">
            <h2>预览与导出</h2>
          </div>
          <div class="preview-actions">
            <button id="copyPreviewBtn" type="button">复制预览 JSON</button>
            <button id="exportWorkflowBtn" type="button">导出 .fengflow.json</button>
            <button id="openOutputBtn" type="button">打开输出目录</button>
          </div>
          <pre id="previewJson" class="code-view">等待加载流程…</pre>
        </section>

        <section class="panel-card">
          <div class="section-head">
            <h2>执行结果</h2>
          </div>
          <pre id="resultStatus" class="status-box">等待操作。</pre>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
