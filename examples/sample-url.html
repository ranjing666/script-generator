<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quest Faucet Portal</title>
    <meta name="keywords" content="quest,reward,faucet,testnet,connect wallet" />
  </head>
  <body>
    <main>
      <h1>Connect Wallet And Claim Rewards</h1>
      <p>Complete quests, claim badge rewards, and use the faucet to get testnet tokens.</p>
      <form id="login-form">
        <input type="email" name="email" placeholder="Email" />
        <input type="password" name="password" placeholder="Password" />
        <button type="submit">Sign In</button>
      </form>
      <button>Connect Wallet</button>
      <button>Claim Reward</button>
      <button>Faucet</button>
      <div class="captcha-box">Captcha required before claiming</div>
    </main>
  </body>
</html>
